steps:
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'backend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/crm-backend:$SHORT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'frontend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/crm-frontend:$SHORT_SHA', '.']
images:
  - 'gcr.io/$PROJECT_ID/crm-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/crm-frontend:$SHORT_SHA'
